function matchingImages(){return DATA.pageImages.filter(img=>(state.level1==='全部'||img.level1===state.level1)&&(state.level2==='全部'||img.level2===state.level2)&&(state.page==='全部'||img.page===state.page))}function renderPageImage(ms){const imgs=matchingImages();if(state.imageIndex>=imgs.length)state.imageIndex=0;const img=imgs[state.imageIndex];$('imageCount').textContent=imgs.length?`${imgs.length} 张匹配图片`:'无匹配图片';if(!img){$('pageScreen').innerHTML='<div class="empty">当前筛选没有对应页面图片</div>';$('imageTitle').textContent='未选择具体页面';$('imageMeta').textContent='可以通过页面/模块筛选定位页面';$('imageChips').innerHTML='';$('thumbs').innerHTML='';return}$('pageScreen').innerHTML=`<img src="${esc(img.src)}" alt="${esc(img.page)}页面截图">`;$('imageTitle').textContent=img.page;$('imageMeta').textContent=`${img.level1} / ${img.level2}`;$('imageChips').innerHTML=Array.from(new Set(ms.filter(m=>m.level1===img.level1&&m.level2===img.level2&&m.page===img.page).map(m=>m.type))).slice(0,6).map(x=>`<span class="chip">${esc(x)}</span>`).join('');$('thumbs').innerHTML=imgs.slice(0,12).map((it,i)=>`<button class="thumb ${i===state.imageIndex?'active':''}" data-i="${i}" title="${esc(it.level2+' / '+it.page)}"><img src="${esc(it.src)}" alt=""></button>`).join('');document.querySelectorAll('.thumb').forEach(b=>b.onclick=()=>{state.imageIndex=Number(b.dataset.i);renderPageImage(ms)})}
function renderWarnings(ms){const items=[];const highLoss=[...ms].filter(m=>m.type==='流失率').sort((a,b)=>(b.valueAgg||0)-(a.valueAgg||0))[0],lowConv=[...ms].filter(m=>m.type==='转化率').sort((a,b)=>(a.valueAgg||0)-(b.valueAgg||0))[0],lowClick=[...ms].filter(m=>m.type==='点击率').sort((a,b)=>(a.valueAgg||0)-(b.valueAgg||0))[0];if(highLoss)items.push(['red','流失率最高',highLoss]);if(lowConv)items.push(['orange','转化率最低',lowConv]);if(lowClick)items.push(['orange','点击率最低',lowClick]);$('warnCount').textContent=`${items.length} 条`;$('warnings').innerHTML=items.map(([cls,t,m])=>`<div class="warn ${cls}"><div class="warn-title">${t}</div><div class="warn-value">${m.display}</div><div class="warn-meta">${esc(m.page)} · ${esc(m.metric)}</div><div class="warn-meta">${esc(m.definition||m.involved)}</div></div>`).join('')||'<div class="empty">当前筛选暂无预警</div>'}
function selectedFunnel(){const rows=DATA.funnelDaily.filter(f=>f.name===state.funnel&&inDate(f.date)),map=new Map();for(const r of rows){const k=r.order+'|'+r.stage;if(!map.has(k))map.set(k,{order:r.order,stage:r.stage,users:0});map.get(k).users+=r.users}return Array.from(map.values()).sort((a,b)=>a.order-b.order)}function renderFunnel(){const arr=selectedFunnel(),max=Math.max(1,...arr.map(r=>r.users)),rate=arr.length&&arr[0].users?arr[arr.length-1].users/arr[0].users:0;$('funnelCount').textContent=`${arr.length} 步`;$('funnelRate').textContent=pct(rate);$('funnelView').innerHTML=arr.map((r,i)=>{const prev=i?arr[i-1].users:r.users,loss=i?prev-r.users:0,lossRate=i?loss/prev:0,hot=lossRate>=.35;return`<div class="funnel-step ${hot?'hot':''}"><div class="step">${r.order}</div><div><div class="stage">${esc(r.stage)}</div><div class="loss">流失 ${fmt(loss)} · 流失率 ${i?pct(lossRate):'0.0%'}</div></div><div class="track"><div class="fill ${hot?'red':'green'}" style="width:${Math.max(4,r.users/max*100)}%"></div></div><strong>${fmt(r.users)}</strong></div>`}).join('')}
function sum(rows,k){return rows.reduce((s,r)=>s+(Number(r[k])||0),0)}function renderTrend(ms){const ids=new Set(ms.map(m=>m.id)),dates=Array.from(new Set(DATA.daily.filter(d=>ids.has(d.id)&&inDate(d.date)).map(d=>d.date))).sort();const rows=dates.map(date=>{const ds=DATA.daily.filter(d=>d.date===date&&ids.has(d.id)),clickIds=new Set(ms.filter(m=>m.type==='点击率').map(m=>m.id)),c=ds.filter(d=>clickIds.has(d.id));return{date,pv:sum(ds,'pv'),uv:sum(ds,'uv'),click:c.length?sum(c,'num')/Math.max(1,sum(c,'den')):0}});$('trendChart').innerHTML=lineSvg(rows);bindTrendTips(rows)}
function lineSvg(rows){if(!rows.length)return'<div class="empty">当前时间段没有数据</div>';const w=680,h=250,p=34,maxPV=Math.max(1,...rows.map(r=>r.pv)),maxUV=Math.max(1,...rows.map(r=>r.uv));const x=i=>p+(w-p*2)*(rows.length===1?0:i/(rows.length-1)),y=(v,max)=>h-p-(h-p*2)*v/max,yr=v=>h-p-(h-p*2)*v;const poly=(pts,c)=>`<polyline fill="none" stroke="${c}" stroke-width="2.5" points="${pts}"/>`;const dots=rows.map((r,i)=>`<circle class="trend-dot" data-i="${i}" cx="${x(i)}" cy="${y(r.pv,maxPV)}" r="5" fill="#2563eb" opacity=".85"/><circle class="trend-dot" data-i="${i}" cx="${x(i)}" cy="${y(r.uv,maxUV)}" r="5" fill="#0891b2" opacity=".85"/><circle class="trend-dot" data-i="${i}" cx="${x(i)}" cy="${yr(r.click)}" r="5" fill="#16a34a" opacity=".85"/>`).join('');return`<svg class="chart" viewBox="0 0 ${w} ${h}"><line x1="${p}" y1="${h-p}" x2="${w-p}" y2="${h-p}" stroke="#dbe3ee"/><line x1="${p}" y1="${p}" x2="${p}" y2="${h-p}" stroke="#dbe3ee"/>${poly(rows.map((r,i)=>`${x(i)},${y(r.pv,maxPV)}`).join(' '),'#2563eb')}${poly(rows.map((r,i)=>`${x(i)},${y(r.uv,maxUV)}`).join(' '),'#0891b2')}${poly(rows.map((r,i)=>`${x(i)},${yr(r.click)}`).join(' '),'#16a34a')}${dots}<text x="${p}" y="${h-8}" class="axis">${rows[0].date.slice(5)}</text><text x="${w-p-38}" y="${h-8}" class="axis">${rows[rows.length-1].date.slice(5)}</text></svg>`}function bindTrendTips(rows){const tip=$('tooltip');document.querySelectorAll('.trend-dot').forEach(dot=>{dot.onmousemove=e=>{const r=rows[Number(dot.dataset.i)];tip.style.display='block';tip.style.left=e.clientX+12+'px';tip.style.top=e.clientY+12+'px';tip.innerHTML=`${r.date}<br>PV：${fmt(r.pv)}<br>UV：${fmt(r.uv)}<br>整体点击率：${pct(r.click)}`};dot.onmouseleave=()=>tip.style.display='none'})}
function renderFail(ms){
  const failurePages = new Set(['注册失败页','实名认证未通过页','资料归档失败页']);
  const failureGroups = new Set(['注册失败页','认证未通过','认证资料归档失败']);
  const shouldShow = failurePages.has(state.page) || failureGroups.has(state.level2);
  $('failPanel').style.display = shouldShow ? 'block' : 'none';
  if (!shouldShow) return;

  const total = sum(DATA.failReasons, 'count');
  const colors = ['#dc2626','#ea580c','#f59e0b','#2563eb','#0891b2'];
  const cx = 110;
  const cy = 88;
  const radius = 58;
  const piePath = (cx, cy, r, start, end) => {
    const x1 = cx + r * Math.cos(start);
    const y1 = cy + r * Math.sin(start);
    const x2 = cx + r * Math.cos(end);
    const y2 = cy + r * Math.sin(end);
    const large = end - start > Math.PI ? 1 : 0;
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
  };
  let angle = -Math.PI / 2;
  const slices = DATA.failReasons.map((r, i) => {
    const pctValue = total ? r.count / total : 0;
    const next = angle + pctValue * Math.PI * 2;
    const path = `<path d="${piePath(cx, cy, radius, angle, next)}" fill="${colors[i % colors.length]}"></path>`;
    angle = next;
    return path;
  }).join('');

  const labels = DATA.failReasons.map((r, i) =>
    `<div><i class="dot" style="background:${colors[i % colors.length]}"></i>${esc(r.reason)} · ${pct(r.count / total)}</div>`
  ).join('');

  $('failChart').innerHTML = `
    <svg viewBox="0 0 220 176" class="chart" preserveAspectRatio="xMidYMid meet">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"></circle>
      ${slices}
      <text x="${cx}" y="${cy - 2}" text-anchor="middle" style="font-size:18px;font-weight:900;fill:#111827">${total}</text>
      <text x="${cx}" y="${cy + 18}" text-anchor="middle" style="font-size:11px;fill:#64748b">总量</text>
    </svg>
    <div class="legend">${labels}</div>`;
}
function renderSource(){const rows=[{source:'账号信息页',count:1260},{source:'注册成功页',count:830},{source:'侧边导航',count:710},{source:'认证结果页',count:520},{source:'其他入口',count:390}];renderBars('sourceRank',rows,'source',r=>r.count,r=>fmt(r.count),'')}function renderBars(id,rows,key,val,right,cls){const max=Math.max(1,...rows.map(val));$(id).innerHTML=rows.map(r=>`<div class="bar-row"><div class="label" title="${esc(r[key])}">${esc(r[key])}</div><div class="track"><div class="fill ${cls}" style="width:${Math.max(4,val(r)/max*100)}%"></div></div><strong>${right(r)}</strong></div>`).join('')}
function renderCards(ms){$('metricCount').textContent=`${ms.length} 项`; $('metricCards').innerHTML=ms.sort((a,b)=>a.id.localeCompare(b.id)).map(m=>`<article class="metric-card"><div class="metric-top"><div class="metric-title">${esc(m.metric)}</div><span class="tag">${esc(m.type)}</span></div><div class="metric-value">${esc(m.display)}</div><div class="meta">${esc(m.definition||m.involved||'暂无定义')}</div><div class="path">${esc(m.level1)} / ${esc(m.level2)} / ${esc(m.page)}</div></article>`).join('')||'<div class="empty">没有匹配指标</div>'}
function render(){renderFilters();const ms=metricAgg(filteredBase());renderKpis(ms);renderPageImage(ms);renderWarnings(ms);renderTrend(ms);renderFunnel();renderFail(ms);renderSource();renderCards(ms)}['level1','level2','page','type','funnelSelect'].forEach(id=>$(id).addEventListener('change',e=>{state[id==='funnelSelect'?'funnel':id]=e.target.value;state.imageIndex=0;render()}));$('startDate').addEventListener('change',e=>{state.start=e.target.value||DATA.dateRange[0];if(state.start>state.end)state.end=state.start;render()});$('endDate').addEventListener('change',e=>{state.end=e.target.value||DATA.dateRange[1];if(state.end<state.start)state.start=state.end;render()});render();
</script></body></html>
